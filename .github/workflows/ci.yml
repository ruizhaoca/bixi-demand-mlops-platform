name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main, "Louis'-modification", "Louis-modification"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # matches runtime.txt + the Docker images

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt          # Streamlit serving deps
          pip install -r requirements-streamlit-api.txt # FastAPI-backed Streamlit UI
          pip install -r requirements-api.txt      # FastAPI serving deps (adds fastapi/uvicorn)
          pip install -r requirements-train.txt    # pipeline (Phase-2) deps (installed last: pins env)
          pip install pytest                        # test runner (not a runtime dep)

      - name: Run tests
        run: pytest -q tests/   # scope to tests/ so stale infra/cdk.out copies aren't collected

      - name: Build training / pipeline image
        run: docker build -f docker/Dockerfile.train -t bixi-pipeline .

      - name: Build Streamlit (EC2) image
        run: docker build -f docker/Dockerfile.streamlit_ec2 -t bixi-streamlit .

      - name: Build FastAPI-backed Streamlit image
        run: docker build -f docker/Dockerfile.streamlit_fastapi -t bixi-streamlit-fastapi .

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t bixi-api .

      - name: Smoke test pipeline image (no AWS)
        run: docker run --rm bixi-pipeline --help

      - name: Smoke test API image (no AWS, local mode)
        run: |
          docker run -d -e BIXI_SERVING_MODE=local -p 8000:8000 --name bixi-api bixi-api
          ok=
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then echo "API healthy"; ok=1; break; fi
            sleep 2
          done
          docker logs bixi-api
          docker rm -f bixi-api
          test "$ok" = "1"

      - name: Smoke test Streamlit-to-FastAPI contract (no AWS)
        run: |
          docker network create bixi-serving
          docker run -d --network bixi-serving -e BIXI_SERVING_MODE=local --name bixi-api bixi-api
          ok=
          for _ in $(seq 1 30); do
            if docker exec bixi-api curl -fsS http://localhost:8000/health; then ok=1; break; fi
            sleep 2
          done
          test "$ok" = "1"
          docker run --rm --network bixi-serving \
            -e BIXI_API_URL=http://bixi-api:8000 \
            bixi-streamlit-fastapi \
            python -c "from bixi.fastapi_client import load_api_bundles; print(len(load_api_bundles()))"
          docker rm -f bixi-api
          docker network rm bixi-serving
